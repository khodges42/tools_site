<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Library</title>

<style>
:root{
    --bg:#f6f0e4;
    --paper:#fbf8f2;
    --ink:#2c241d;
    --accent:#6f4f28;
    --border:#b79c74;
    --shadow:rgba(0,0,0,.15);
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(#ece2d2,#d8c7a7);
    font-family:Georgia, serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.library{
    width:min(700px,92vw);
    background:var(--paper);
    border:2px solid var(--border);
    box-shadow:0 18px 40px var(--shadow);
    padding:3rem;
}

h1{
    text-align:center;
    margin-top:0;
    font-size:2.5rem;
    font-weight:normal;
    letter-spacing:.08em;
}

.subtitle{
    text-align:center;
    color:#766554;
    font-style:italic;
    margin-bottom:2.5rem;
}

.shelf{
    border-top:1px solid var(--border);
}

.book{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 0;
    border-bottom:1px solid #d8c6a8;
    text-decoration:none;
    color:inherit;
    transition:.15s;
}

.book:hover{
    background:#f2ebdd;
    padding-left:1rem;
}

.title{
    font-size:1.15rem;
}

.status{
    font-size:.85rem;
    color:#85735d;
    font-style:italic;
}

.footer{
    margin-top:2rem;
    text-align:center;
    color:#887760;
    font-size:.9rem;
}
</style>

</head>
<body>

<div class="library">

<h1>The Library</h1>

<div class="subtitle">
Choose a volume to begin your journey.
</div>

<div class="shelf">

<a class="book" href="./werewolves_vs_vampires/">
    <div class="title">
        📖 Werewolves vs. Vampires
    </div>

    <div class="status">
        Demo story or doomed love story? find out!
    </div>
</a>

</div>

<div class="footer">
One story currently rests upon these shelves.
</div>

</div>

</body>
</html>
