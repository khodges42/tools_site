passages:
  rome_arrival:
    type: story
    title: "Rome, While You Are Still Alive"
    text: |
      Dawn reaches the Subura by argument: shutters thrown open, carts cursing at corners, bread ovens breathing into alleys already warm with bodies.

      {{name}} has no prophecy. There is rent due in nine days, a cracked tablet from the landlord's clerk, and three people already acting as if your time belongs to them.

      This is the part of the story before blood, before clan, before any beautiful monster explains your life back to you. Rome wants to know what you will protect while you are still easy to kill.
    choices:
      - text: "Begin with the household that expects you home."
        goto: rome_family
        effects:
          flags:
            rome_attachment_family: true
          stats:
            obligation: 1
      - text: "Begin with the work that owns your daylight."
        goto: rome_work
        effects:
          flags:
            rome_attachment_work: true
          stats:
            wealth: 1
      - text: "Begin with the argument you should have walked away from."
        goto: rome_cause
        effects:
          flags:
            rome_attachment_cause: true
          stats:
            risk: 1
      - text: "Begin with the thing you make when nobody is paying."
        goto: rome_art
        effects:
          flags:
            rome_attachment_art: true
          stats:
            learning: 1

  rome_family:
    type: story
    title: "The Third-Floor Room"
    text: |
      Your household is one room above a dyer's stall, reached by stairs that lean like a drunk witness. The landlord's clerk has scratched the rent date into a wax tablet and left it where everyone can see it.

      Livia, your aunt by affection rather than blood, keeps a brazier low and a tally of who has eaten. She took you in after your first patron died and still calls you child when she wants something impossible.

      Her grandson Gaius waits by the door with a bundle under his tunic: copied verses from a banned poet, borrowed from a tutor who will deny knowing him if the wrong man asks. Livia wants the tablets gone before the morning search reaches this insula. Gaius wants them saved.
    choices:
      - text: "Hide the tablets under the dyer's ash and promise Gaius you will recover them tonight."
        goto: rome_family_ash
        effects:
          flags:
            rome_helped_livia: true
            rome_protected_tablets: true
            rome_promised_gaius: true
          stats:
            obligation: 2
            risk: 1
            learning: 1
          add_items:
            - forbidden_text
      - text: "Burn the copies now and let Livia owe you for keeping the room safe."
        goto: rome_family_burn
        effects:
          flags:
            rome_helped_livia: true
          stats:
            obligation: 1
            resolve: 1
      - text: "Tell Gaius to carry his own danger and refuse to make the household choose for him."
        goto: rome_family_refuse
        effects:
          stats:
            resolve: 1
            risk: -1

  rome_family_ash:
    type: story
    title: "Ash Keeps Secrets Poorly"
    text: |
      The dyer curses when you ask for ash but gives it anyway, because Livia once nursed his wife through a fever and because everybody in the Subura is someone's creditor.

      Gaius watches you bury the tablets in gray powder. His relief is too loud. He thinks you saved poems. Livia knows you bought a future favor with a boy's trust and a woman's fear.

      If those words survive, Gaius will remember who helped them cross the first dangerous hour. If they burn later, he will remember who had the chance to save them.
    choices:
      - text: "Carry the ash-smell back into the street."
        goto: rome_crossroads

  rome_family_burn:
    type: story
    title: "Smoke Without Witnesses"
    text: |
      Wax softens. Scratched lines vanish into heat. Gaius looks at you as if you have murdered a person small enough to fit in his hand.

      Livia says nothing until the smoke is gone. Then she presses a cheap bronze charm into your palm: not payment, not thanks, just proof that she knows exactly what kind of debt this is.

      The household is safer. The boy is not. A future version of this family may remember you as protector, coward, or censor depending on who survives to tell it.
    choices:
      - text: "Put the charm away and return to the street."
        goto: rome_crossroads
        effects:
          add_items:
            - family_token

  rome_family_refuse:
    type: story
    title: "The Door Stays Open"
    text: |
      You refuse to touch the bundle. Livia's mouth tightens. Gaius grins with all the stupidity of a boy mistaking abandonment for respect.

      He leaves by the stairs, quick and proud. A search party could miss him. A tutor could betray him. Or he could learn that adults survive by placing danger into younger hands and calling it principle.

      You have kept yourself cleaner. Rome notices clean hands only when someone else points at them.
    choices:
      - text: "Return to the street before Livia speaks again."
        goto: rome_crossroads

  rome_work:
    type: story
    title: "The Copyist's Bench"
    text: |
      Your daylight belongs to Marcus Fulvius, a notary with soft hands, hard prices, and a client list that touches magistrates, merchants, widows, and men who never give the same name twice.

      You copy contracts in a rented stall near the Forum. Marriage portions. Manumission records. Shipping claims. Quiet threats disguised as loans. Rome is ruled by people who can afford witnesses.

      This morning Marcus gives you two jobs: alter a debt date for a grain broker, or copy a widow's petition exactly even though he says exactness will cost you both a patron.
    choices:
      - text: "Alter the broker's date and earn Marcus's protection."
        goto: rome_work_alter
        effects:
          flags:
            rome_patron_debt: true
          stats:
            wealth: 2
            influence: 1
            humanity: -1
      - text: "Copy the widow's petition exactly and risk losing the stall's best client."
        goto: rome_work_exact
        effects:
          flags:
            rome_public_stand: true
          stats:
            resolve: 1
            risk: 1
            humanity: 1
      - text: "Make a private duplicate before choosing what Marcus sees."
        goto: rome_work_duplicate
        effects:
          flags:
            rome_secret_record: true
          stats:
            learning: 1
            risk: 1
          add_items:
            - rent_tablet

  rome_work_alter:
    type: story
    title: "A Date Moves Like a Knife"
    text: |
      One line changes. A debt becomes older. A man you have never met loses time he thought he still had.

      Marcus smiles without warmth and says you understand the city. By noon, the grain broker's runner leaves a coin heavy enough to matter and a warning light enough to pretend it was a joke.

      This is how institutions begin: not with marble, but with useful lies written in a steady hand.
    choices:
      - text: "Return to the street with ink under your nails."
        goto: rome_crossroads

  rome_work_exact:
    type: story
    title: "The Petition Remains Ugly"
    text: |
      You copy the widow's words as she spoke them: the missing shipment, the dead son, the brother-in-law trying to fold her house into his accounts.

      Marcus reads the result twice. He does not shout. That is worse. Outside, the widow sees your face and understands before you can explain.

      If the petition travels, it may become a case, a scandal, a precedent, or a reason for someone powerful to learn your name.
    choices:
      - text: "Return to the street before Marcus decides your wages."
        goto: rome_crossroads

  rome_work_duplicate:
    type: story
    title: "Two Copies"
    text: |
      Your public copy can obey Marcus. Your private copy can remember what happened.

      You press the stylus carefully, not because justice requires beauty but because survival sometimes requires a document no one knows exists.

      A secret record is not virtue. It is leverage waiting for a hand brave or desperate enough to use it.
    choices:
      - text: "Hide the duplicate and return to the street."
        goto: rome_crossroads

  rome_cause:
    type: story
    title: "The Fountain Argument"
    text: |
      At the neighborhood fountain, a builder's foreman has posted two men to shove tenants out of the water line. He says the pipe is being repaired for public good. Everyone can see the new channel bending toward a private bathhouse.

      A baker named Prisca has already bloodied one man's lip with a water jar. The crowd loves her until the foreman says names will be taken for the magistrate.

      Your household needs this fountain. Your employer needs the builder's contracts. Your silence would be rational and everyone here would hear it.
    choices:
      - text: "Stand beside Prisca and make the theft public."
        goto: rome_cause_stand
        effects:
          flags:
            rome_public_stand: true
          stats:
            influence: 1
            risk: 2
            resolve: 1
      - text: "Quietly memorize the foreman's names and marks."
        goto: rome_cause_watch
        effects:
          flags:
            rome_secret_record: true
          stats:
            learning: 1
            risk: 1
      - text: "Pull Prisca away before the crowd spends her life for excitement."
        goto: rome_cause_pull
        effects:
          flags:
            rome_prisca_spared: true
          stats:
            humanity: 1
            obligation: 1

  rome_cause_stand:
    type: story
    title: "Names Taken Aloud"
    text: |
      You say the bathhouse owner's name before the foreman can make the argument about disorder. Prisca catches the shape of it and repeats it louder.

      The crowd changes. Not braver, exactly. More specific. Specific anger is harder to sweep away.

      By evening, your name will be in two mouths: one grateful, one paid to remember threats.
    choices:
      - text: "Leave before the magistrate's clerk arrives."
        goto: rome_crossroads

  rome_cause_watch:
    type: story
    title: "Useful Cowardice"
    text: |
      You stay near the edge and watch. The foreman has a scar through his left brow. One guard wears a military belt too fine for him. The wax seal on the notice is real but reused.

      Prisca sees you seeing and spits near your sandal. She wanted a body beside hers, not a ledger of future possibilities.

      Still, details survive panic. Later, the right detail in the right ear can move more stone than a heroic bruise.
    choices:
      - text: "Carry what you noticed back into the street."
        goto: rome_crossroads

  rome_cause_pull:
    type: story
    title: "The Jar Does Not Break"
    text: |
      You catch Prisca's wrist before the second swing. She nearly turns the jar on you, then sees the clerk approaching behind the foreman.

      The crowd groans as if denied theater. Prisca hates you for three breaths. On the fourth, she understands she still has hands to knead tomorrow's bread.

      Saving someone from the city's appetite does not stop the theft. It only means one more angry person survives to plan.
    choices:
      - text: "Walk away with water still unresolved."
        goto: rome_crossroads

  rome_art:
    type: story
    title: "The Unpaid Face"
    text: |
      Behind the notary stall, when Marcus thinks you are sanding tablets, you shape faces in cheap wax: Livia's suspicion, Gaius's hunger for forbidden words, Prisca's fury at the fountain, your own face as you wish it looked when you were not being useful.

      A young noble, Aelius Varro, finds the hidden board and laughs once before he sees you are not joking. He offers payment for a funeral image of his dead sister, then lowers his voice and asks whether you can make her look forgiving.

      It is art, work, fraud, grief, and patronage in one soft lump warming under your thumb.
    choices:
      - text: "Accept Varro's commission and the risk of being owned by it."
        goto: rome_art_accept
        effects:
          flags:
            rome_patron_debt: true
          stats:
            wealth: 1
            influence: 1
            obligation: 1
          add_items:
            - patron_ring
      - text: "Refuse to sell forgiveness to a man who wants grief improved."
        goto: rome_art_refuse
        effects:
          stats:
            resolve: 1
            risk: 1
      - text: "Make a private study of the sister's real, unforgiving face."
        goto: rome_art_secret
        effects:
          flags:
            rome_secret_sketch: true
          stats:
            learning: 1
            risk: 1
          add_items:
            - wax_portrait

  rome_art_accept:
    type: story
    title: "A Ring for a Lie"
    text: |
      Varro leaves a ring as surety. Too much payment for wax, not enough for silence.

      He describes his sister with the impatience of someone editing the dead for an audience. Softer mouth. Gentler brow. Less accusation.

      If you succeed, a noble house may remember you as useful. If the likeness is too true, usefulness can sour into danger.
    choices:
      - text: "Pocket the ring and return to the street."
        goto: rome_crossroads

  rome_art_refuse:
    type: story
    title: "No Patron, No Shield"
    text: |
      Varro's expression closes like a door in a rich house. He says you mistake yourself for someone with choices.

      Maybe he is right. Maybe the first honest thing you make today is an enemy.

      The wax face on your board slumps in the heat, free of him and useless to you.
    choices:
      - text: "Scrape the wax clean and return to the street."
        goto: rome_crossroads

  rome_art_secret:
    type: story
    title: "The Face Under the Face"
    text: |
      You ask enough questions to make Varro vain and not enough to make him careful. His sister's real face appears in what he avoids: the argument before she died, the letter he burned, the way he says forgiveness as if it were a household object.

      Your private study is ugly with truth. It could become blackmail, relic, memory, or the only honest image anyone keeps of her.
    choices:
      - text: "Wrap the wax study and return to the street."
        goto: rome_crossroads

  rome_crossroads:
    type: story
    title: "The Day Asks for a Second Thing"
    text: |
      By late afternoon, Rome has taken your labor and left fingerprints. The room above the dyer waits. The rent tablet waits. So do the people who learned, today, whether you can be useful, frightened, brave, profitable, or blamed.

      The first choice did not close the day. It only taught the city where to press next.
    choices:
      - text: "Let the patron's message follow you home."
        goto: rome_evening_patron_livia
        requires:
          flag: rome_patron_debt
        effects:
          flags:
            rome_evening_second_stop: true
            rome_evening_livia_seen: true
            rome_evening_patron_pressure: true
      - text: "Warn Prisca before Marcus's paperwork makes the fountain theft official."
        goto: rome_evening_prisca_marcus
        requires:
          flag: rome_public_stand
        effects:
          flags:
            rome_evening_second_stop: true
            rome_evening_prisca_seen: true
            rome_evening_marcus_seen: true
      - text: "Find Gaius before the notary's errand finds him first."
        goto: rome_evening_gaius_marcus
        requires:
          flag: rome_protected_tablets
        effects:
          flags:
            rome_evening_second_stop: true
            rome_evening_gaius_seen: true
            rome_evening_marcus_seen: true
      - text: "Carry the honest face through Prisca's back door."
        goto: rome_evening_wax_prisca
        requires:
          flag: rome_secret_sketch
        effects:
          flags:
            rome_evening_second_stop: true
            rome_evening_prisca_seen: true
            rome_evening_varro_seen: true
      - text: "Bring the hidden record where Livia can decide whether survival needs proof."
        goto: rome_evening_record_livia
        requires:
          flag: rome_secret_record
        effects:
          flags:
            rome_evening_second_stop: true
            rome_evening_livia_seen: true
            rome_evening_marcus_seen: true
      - text: "Go home because you chose not to carry anyone else's weapon."
        goto: rome_night_bare_rent
        requires:
          all:
            - not_flag: rome_patron_debt
            - not_flag: rome_public_stand
            - not_flag: rome_protected_tablets
            - not_flag: rome_secret_sketch
            - not_flag: rome_secret_record
        effects:
          flags:
            rome_nightfall_started: true
            rome_collector_met: true

  rome_evening_patron_livia:
    type: story
    title: "A Name at the Stair"
    text: |
      The messenger reaches the insula before you do. He waits beside Livia's brazier with a sealed note, too clean to sit and too young to understand why everyone in the room is staring at his sandals.

      If the seal belongs to Varro, the house wants the funeral image before dawn. If it belongs to Marcus's grain broker, the altered debt has already started eating someone else's week. Either way, the name on the wax is heavier than the tablet that says rent.

      Livia looks from the messenger to you. She does not ask whether this patron can help. She asks what he will own afterward.
    choices:
      - text: "Let the patron's name buy the household one more night."
        goto: rome_night_varro_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_varro_claimed: true
            rome_collector_met: true
          stats:
            obligation: 1
            influence: 1
      - text: "Send the messenger away and keep the household out of his mouth."
        goto: rome_night_varro_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_varro_claimed: true
            rome_collector_met: true
          stats:
            risk: 1
            resolve: 1

  rome_evening_prisca_marcus:
    type: story
    title: "Flour on the Record"
    text: |
      Prisca's bakery is half-barred when you arrive. A sack of flour has split across the floor, white as road dust, and Marcus's runner is reading from a tablet as if bread ovens obey written notices.

      The builder's men have changed their story. The fountain was never public, they say. The crowd never named the bathhouse owner. Prisca never bled. Marcus can make that lie clean enough to travel.

      Prisca looks at you once. Not pleading. Measuring. She wants a witness who can also carry a sack.
    choices:
      - text: "Stand in the flour and make Marcus's runner write your name too."
        goto: rome_night_fountain_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_fountain_threatened: true
            rome_collector_met: true
          stats:
            risk: 1
            resolve: 1
      - text: "Help Prisca move the flour, then tell her which names to avoid saying aloud."
        goto: rome_night_fountain_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_fountain_threatened: true
            rome_collector_met: true
          stats:
            humanity: 1
            obligation: 1

  rome_evening_gaius_marcus:
    type: story
    title: "Verses in a Notary's Hand"
    text: |
      You find Gaius near Marcus's stall, exactly where a clever boy goes when he wants danger to look like learning. He has ash on one sleeve and the bright face of someone who thinks adults are too frightened of paper.

      Marcus's apprentice is also there, asking whether anyone has seen a schoolboy carrying copied verses. The question sounds casual until you notice the second tablet under his arm: names from the morning search, spaces left open.

      Gaius whispers that the poem is worth the risk. He says this as if poems and risks are weighed by boys instead of collected by men.
    choices:
      - text: "Put your own name into the apprentice's empty space and send Gaius home."
        goto: rome_night_gaius_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_gaius_hunted: true
            rome_collector_met: true
          stats:
            risk: 1
            obligation: 1
      - text: "Teach Gaius how to lie badly enough that Marcus underestimates him."
        goto: rome_night_gaius_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_gaius_hunted: true
            rome_collector_met: true
          stats:
            learning: 1
            humanity: -1

  rome_evening_wax_prisca:
    type: story
    title: "The Face Behind the Oven"
    text: |
      Prisca hides the wax study behind the oven because nobody searches hot brick carefully. The sister's face softens there, not into forgiveness, but into heat.

      A woman in a dark veil comes through the back door while Prisca is washing blood from her wrist. She knows Varro's house. She knows the dead sister's real name. When she sees the covered wax, she stops breathing for one whole count.

      Now the portrait is not only leverage. It is testimony from a dead mouth.
    choices:
      - text: "Let Prisca keep the study hidden until someone from Varro's house lies again."
        goto: rome_night_wax_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_collector_met: true
          stats:
            obligation: 1
            risk: 1
      - text: "Take the wax back; truth this useful is already becoming a chain."
        goto: rome_night_wax_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_collector_met: true
          stats:
            resolve: 1
            learning: 1

  rome_evening_record_livia:
    type: story
    title: "What a Room Can Prove"
    text: |
      Livia does not read the hidden tablet. She makes you read it aloud while she counts lentils into two bowls instead of three.

      A widow's petition, a reused seal, a list of men at the fountain: whatever you preserved today, it sounds different inside the room. Outside, it was leverage. Here, it is dinner, rent, danger, and the possibility of making someone with better sandals hesitate.

      Marcus's boy knocks before you finish. He says his master wants the copy returned. He does not say how Marcus knew.
    choices:
      - text: "Use the tablet tonight, before Marcus can make it disappear."
        goto: rome_night_record_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_collector_met: true
          stats:
            influence: 1
            risk: 1
      - text: "Hide it from Marcus, Livia, and everyone who needs hope too loudly."
        goto: rome_night_record_and_rent
        effects:
          flags:
            rome_nightfall_started: true
            rome_collector_met: true
          stats:
            learning: 1
            obligation: -1

  rome_night_varro_and_rent:
    type: story
    title: "The Ring Opens Doors Sideways"
    text: |
      The collector arrives with two porters, not for payment yet, he says, only to measure what furniture can be carried out quickly if payment fails. He notices the seal, the ring, or the messenger's clean sandals before he notices your face.

      A patron's token can protect a room or mark it for extraction. If you use the borrowed name, Livia keeps her brazier and sleeping mat tonight, but someone richer owns the shape of that mercy. If you hide it, the collector starts pricing the household aloud.

      Across the alley, under a balcony without a lamp, a pale old man watches the exchange as if listening to music written in debt. When his eyes meet yours, he smiles like someone who has found the instrument he came for.
    choices:
      - text: "Use the borrowed name and let one debt bite another."
        goto: rome_nightfall_debt_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_debt: true
          stats:
            obligation: 2
            influence: 1
            humanity: -1
      - text: "Hide the name and force the collector to threaten you plainly."
        goto: rome_nightfall_debt_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_debt: true
          stats:
            risk: 2
            resolve: 1

  rome_night_fountain_and_rent:
    type: story
    title: "Water Has Witnesses"
    text: |
      Prisca's bakery smells of ash and wet flour. She has barred the front with a kneading table because the foreman's men came once already and promised to come back with proper authority.

      The landlord's collector is there too, tapping the rent tablet against his palm. He does not care about the fountain except as leverage. A dry household pays late. A frightened baker pays in names.

      Prisca wants you to repeat the bathhouse owner's name in front of the collector. The collector wants you to deny it was ever said. Either way, he writes something down.

      In the street beyond his shoulder, an old man in a travel-stained cloak watches the tablet more than the people. He seems amused that one scratched line can move so many bodies.
    choices:
      - text: "Repeat the name and make the collector part of the record."
        goto: rome_nightfall_public_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_public: true
          stats:
            risk: 2
            influence: 1
            resolve: 1
      - text: "Deny the public accusation and keep Prisca alive for a quieter fight."
        goto: rome_nightfall_public_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_public: true
          stats:
            humanity: 1
            obligation: 1
            influence: -1

  rome_night_gaius_and_rent:
    type: story
    title: "Ash After Dark"
    text: |
      The dyer's ash is still warm when you dig through it. Your fingers find broken charcoal, wool grease, a bent nail, and finally the wrapped tablets.

      Gaius is not waiting where he promised. Livia is. So is the landlord's collector, who has decided that a household hiding writing may also be hiding money. He asks what you recovered and smiles as if every possible answer belongs to him.

      You can hand over the verses and buy the room one safer night. You can keep them and put Livia between the collector and a boy who wanted forbidden words more than he understood danger.

      From the alley mouth, a pale old man watches your ash-black hands with almost scholarly interest. He does not intervene. He looks like the kind of person who prefers experiments unspoiled.
    choices:
      - text: "Give up the tablets to keep Livia's room intact."
        goto: rome_nightfall_learning_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_learning: true
          remove_items:
            - forbidden_text
          stats:
            humanity: -1
            obligation: 1
            risk: -1
      - text: "Keep Gaius's verses and make the collector leave empty-handed."
        goto: rome_nightfall_learning_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_learning: true
          stats:
            risk: 2
            resolve: 1
            learning: 1

  rome_night_wax_and_rent:
    type: story
    title: "A Face Worth Rent"
    text: |
      The wax study sweats inside its cloth. Varro's sister stares through every fold you wrap around her, unforgiving and therefore valuable.

      The landlord's collector arrives before you can decide who should see it. He starts with the rent tablet and ends by asking whether the noble house knows you kept a second face. Someone has been talking. Or someone has been buying talk.

      You can trade the study as leverage and keep the room. You can destroy it and leave yourself poorer but harder to use.

      Near the stairs, a pale old man watches the covered wax as if he can see the face through cloth. His expression says he has known many artists and fewer honest ones.
    choices:
      - text: "Trade the hidden face for time."
        goto: rome_nightfall_art_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_art: true
          remove_items:
            - wax_portrait
          stats:
            wealth: 1
            influence: 1
            humanity: -1
      - text: "Crush the wax before it becomes someone else's chain."
        goto: rome_nightfall_art_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_art: true
          remove_items:
            - wax_portrait
          stats:
            resolve: 2
            risk: 1

  rome_night_record_and_rent:
    type: story
    title: "A Tablet with Two Shadows"
    text: |
      The hidden record feels heavier after dark. Whether it holds a widow's ugly petition, a reused seal, or a set of names caught beside the fountain, it has become a small portable future: proof for someone, threat for someone else.

      Marcus's boy waits near the stair with a message you are not supposed to read twice. The landlord's collector waits above him with two porters and a tablet of his own. They both want the same thing from you: a clean answer that makes someone else's account easier.

      Livia sees the tablet tucked under your sleeve. She does not ask what it says. She asks whether it can keep the room standing.

      Under the opposite arch, a pale old man studies the space between the two tablets and seems delighted that Rome can make paper, wax, hunger, and fear speak in the same hand.
    choices:
      - text: "Use the hidden record as leverage and make the room safer tonight."
        goto: rome_nightfall_record_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_records: true
          stats:
            influence: 1
            obligation: 1
            risk: 1
      - text: "Keep the record hidden, even from Livia, until it can hurt the right person."
        goto: rome_nightfall_record_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_records: true
          stats:
            learning: 1
            resolve: 1
            obligation: -1

  rome_night_bare_rent:
    type: story
    title: "The Collector Has Good Sandals"
    text: |
      You go home with nothing impressive enough to frighten a landlord's collector. That may be why he smiles. He has good sandals, a wax tablet, and two porters who look at the room as if it is already broken into parts.

      Livia stands in the doorway without asking whether you succeeded at anything today. In the Subura, that question is rude. The only polite question is how much damage followed you back.

      The collector gives you until the next market day to produce coin, patronage, or someone else's misfortune. Behind him, across the alley, a pale old man watches with the patience of a creditor who is owed something older than money.
    choices:
      - text: "Accept the deadline and remember the old man's face."
        goto: rome_nightfall_bare_end
        effects:
          flags:
            rome_cold_observer_seen: true
            rome_observer_bare: true
          stats:
            obligation: 1
            resolve: 1

  rome_nightfall_debt_end:
    type: ending
    title: "A Mercy With Teeth"
    text: |
      The collector leaves eventually. Rome does not. It settles around the room: smoke in the beams, debt in the tablet, footsteps on the stairs, the sour warmth of bodies pretending they can sleep.

      Near midnight, someone knocks once at the street door below and does not knock again.

      Livia wakes. So do you. On the stair, where the old man's feet should have left dust, there is only the faint round mark of a ring pressed into damp clay. He noticed the way borrowed names can open a door, and the way you let one debt bite another.

      This is not the Embrace. Not yet. It is the first time the night chooses to look back.

  rome_nightfall_public_end:
    type: ending
    title: "A Mercy With Teeth"
    text: |
