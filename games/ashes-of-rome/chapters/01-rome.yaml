      Livia wakes. So do you. The ash under your nails has gone pale, almost silver, though you scrubbed until your fingers hurt. Somewhere below, a boy whispers a line he should not know by heart. The old man noticed what you protected, what you surrendered, and whether forbidden words made you careful or hungry.

      This is not the Embrace. Not yet. It is the first time the night chooses to look back.

  rome_nightfall_art_end:
    type: ending
    title: "A Mercy With Teeth"
    text: |
      The collector leaves eventually. Rome does not. It settles around the room: smoke in the beams, debt in the tablet, footsteps on the stairs, the sour warmth of bodies pretending they can sleep.

      Near midnight, someone knocks once at the street door below and does not knock again.

      Livia wakes. So do you. In the brazier's last light, every face in the room looks briefly more honest than it should: tired, frightened, unwilling to forgive you for seeing them. The old man noticed the private likeness, not because it was beautiful, but because truth became useful in your hands.

      This is not the Embrace. Not yet. It is the first time the night chooses to look back.

  rome_nightfall_record_end:
