      Near midnight, someone knocks once at the street door below and does not knock again.

      Livia wakes. So do you. By morning, someone has scratched the bathhouse owner's name into the fountain curb in letters too neat for a drunk and too shallow for a worker with time. The old man did not need to hear bravery. He needed to see whether your words could make other mouths dangerous.

      This is not the Embrace. Not yet. It is the first time the night chooses to look back.

