passages:
  character:
    type: character
    title: "Nine Days' Rent"
    text: |
      Dawn is already warming the roof tiles when {{name}} wakes.

      Rent is due in nine days. The bread queue is longer than yesterday. Someone downstairs is shouting about water, and Livia has left a cup upside down on the table: the household sign for come home before dark.

      Rome has work for you. It always does.
    goto: rome_arrival